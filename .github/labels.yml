# GitHub Labels Definition
# Applied to all aglabo repositories
#
# Color palette:
#   Red     #d73a4a  bug / error
#   Blue    #0075ca  documentation / info
#   Gray    #cfd3d7  duplicate / neutral
#   Cyan    #a2eeef  enhancement / feature
#   Purple  #7057ff  good first issue
#   Green   #008672  help wanted
#   Yellow  #e4e669  invalid / warning
#   Pink    #d876e3  question
#   White   #ffffff  wontfix
#   Gold    #e4b400  task / internal

labels:
  - name: bug
    color: "d73a4a"
    description: Something isn't working

  - name: documentation
    color: "0075ca"
    description: Improvements or additions to documentation

  - name: duplicate
    color: "cfd3d7"
    description: This issue or pull request already exists

  - name: enhancement
    color: "a2eeef"
    description: New feature or request

  - name: good first issue
    color: "7057ff"
    description: Good for newcomers

  - name: help wanted
    color: "008672"
    description: Extra attention is needed

  - name: invalid
    color: "e4e669"
    description: This doesn't seem right

  - name: question
    color: "d876e3"
    description: Further information is requested

  - name: task
    color: "e4b400"
    description: Development, maintenance, or internal project tasks

  - name: wontfix
    color: "ffffff"
    description: This will not be worked on
